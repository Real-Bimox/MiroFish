name: Sync with Upstream

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      sync_strategy:
        description: 'Sync strategy'
        required: true
        default: 'rebase'
        type: choice
        options:
          - rebase
          - merge
      create_pr:
        description: 'Create a PR instead of direct push'
        required: true
        default: true
        type: boolean
  
  # Scheduled trigger (weekly on Sundays at 00:00 UTC)
  schedule:
    - cron: '0 0 * * 0'

env:
  UPSTREAM_URL: https://github.com/666ghj/MiroFish.git
  UPSTREAM_BRANCH: main
  LOCAL_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
      
      - name: Add upstream remote
        run: |
          git remote add upstream ${{ env.UPSTREAM_URL }}
          git fetch upstream
      
      - name: Check for changes
        id: check_changes
        run: |
          LOCAL_COMMITS=$(git log --oneline upstream/${{ env.UPSTREAM_BRANCH }}..HEAD | wc -l)
          UPSTREAM_COMMITS=$(git log --oneline HEAD..upstream/${{ env.UPSTREAM_BRANCH }} | wc -l)
          
          echo "local_commits=$LOCAL_COMMITS" >> $GITHUB_OUTPUT
          echo "upstream_commits=$UPSTREAM_COMMITS" >> $GITHUB_OUTPUT
          
          echo "Commits in your fork but not in upstream: $LOCAL_COMMITS"
          echo "Commits in upstream but not in your fork: $UPSTREAM_COMMITS"
          
          if [ "$UPSTREAM_COMMITS" -eq 0 ]; then
            echo "No new commits from upstream. Exiting."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Create sync branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          SYNC_BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $SYNC_BRANCH
          echo "SYNC_BRANCH=$SYNC_BRANCH" >> $GITHUB_ENV
      
      - name: Sync with upstream (rebase)
        if: steps.check_changes.outputs.has_changes == 'true' && (github.event.inputs.sync_strategy || 'rebase') == 'rebase'
        id: sync_rebase
        run: |
          if git rebase upstream/${{ env.UPSTREAM_BRANCH }}; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "Rebase completed successfully"
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "Rebase has conflicts"
            git rebase --abort
            exit 1
          fi
        continue-on-error: true
      
      - name: Sync with upstream (merge)
        if: steps.check_changes.outputs.has_changes == 'true' && (github.event.inputs.sync_strategy || 'rebase') == 'merge' && steps.sync_rebase.outputs.status != 'success'
        id: sync_merge
        run: |
          if git merge upstream/${{ env.UPSTREAM_BRANCH }} --no-ff -m "Merge upstream changes from 666ghj/MiroFish"; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "Merge completed successfully"
          else
            echo "status=conflict" >> $GITHUB_OUTPUT
            echo "Merge has conflicts"
            git merge --abort
            exit 1
          fi
        continue-on-error: true
      
      - name: Push to sync branch
        if: steps.check_changes.outputs.has_changes == 'true' && (steps.sync_rebase.outputs.status == 'success' || steps.sync_merge.outputs.status == 'success')
        run: |
          git push origin ${{ env.SYNC_BRANCH }}
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && (steps.sync_rebase.outputs.status == 'success' || steps.sync_merge.outputs.status == 'success')
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.SYNC_BRANCH }}
          base: ${{ env.LOCAL_BRANCH }}
          title: 'Sync with upstream 666ghj/MiroFish'
          body: |
            This PR syncs your fork with the upstream repository `666ghj/MiroFish`.
            
            ## Summary
            - **Upstream commits to sync:** ${{ steps.check_changes.outputs.upstream_commits }}
            - **Your custom commits preserved:** ${{ steps.check_changes.outputs.local_commits }}
            - **Sync strategy:** ${{ github.event.inputs.sync_strategy || 'rebase' }}
            - **Sync date:** $(date -u +"%Y-%m-%d %H:%M UTC")
            
            ## Changes from upstream
            $(git log --oneline HEAD..upstream/${{ env.UPSTREAM_BRANCH }} | head -20)
            
            ## Please review
            - [ ] Check that your custom changes are preserved
            - [ ] Test the application locally
            - [ ] Resolve any conflicts if needed
            
            ---
            *This PR was automatically generated by the Sync with Upstream workflow.*
          labels: |
            upstream-sync
            automated
      
      - name: Handle conflicts
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Sync with upstream failed - Manual intervention required`,
              body: `The automated sync with upstream (666ghj/MiroFish) failed due to conflicts.
            
            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            **Next steps:**
            1. Run the sync script locally: \`./.github/sync-with-upstream.sh\`
            2. Resolve conflicts manually
            3. Push the resolved changes
            
            See [SYNC-WORKFLOW.md](https://github.com/${{ github.repository }}/blob/main/SYNC-WORKFLOW.md) for detailed instructions.`,
              labels: ['upstream-sync', 'conflict', 'help wanted']
            });
